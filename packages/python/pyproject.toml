[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "langchain-task-steering"
version = "0.1.5"
description = "Implicit state machine middleware for LangChain v1 agents. Ordered task pipelines with per-task tool scoping, prompt injection, and composable validation."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Edvin Hallvaxhiu" },
]
keywords = ["langchain", "langgraph", "agents", "middleware", "state-machine", "task-pipeline"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "langchain>=1.0.0",
    "langgraph>=0.4.0",
]

[project.urls]
Homepage = "https://github.com/edvinhallvaxhiu/langchain-task-steering"
Repository = "https://github.com/edvinhallvaxhiu/langchain-task-steering"
Issues = "https://github.com/edvinhallvaxhiu/langchain-task-steering/issues"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov",
]
skills = [
    "pyyaml>=6.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/langchain_task_steering"]

[tool.pytest.ini_options]
testpaths = ["tests"]
